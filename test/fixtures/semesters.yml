semester_previous:
  id: 1
  school_id: 1
  name: 'current previous'
  start_date: <%= Date.today.beginning_of_month - 1.month %>
  end_date: <%= Date.today.beginning_of_month - 1.day %>
  seq: 1

semester_current:
  id: 2
  school_id: 1
  name: 'current'
  start_date: <%= Date.today.beginning_of_month %>
  end_date: <%= Date.today.end_of_month %>
  seq: 2

semester_next:
  id: 3
  school_id: 1
  name: 'current next'
  start_date: <%= Date.today.beginning_of_month + 1.month %>
  end_date: <%= Date.today.beginning_of_month + 1.month - 1.day %>
  seq: 3
